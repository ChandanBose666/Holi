name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: |
          npm run build -w packages/shared
          npm run build -w packages/schema
          npm run build -w packages/core
          npm run build -w packages/cli

      - name: Run tests
        run: npm test

      - name: Publish @holi.dev/shared
        run: npm publish -w packages/shared --access public --provenance || echo "already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holi.dev/schema
        run: npm publish -w packages/schema --access public --provenance || echo "already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holi.dev/core
        run: npm publish -w packages/core --access public --provenance || echo "already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @holi.dev/cli
        run: npm publish -w packages/cli --access public --provenance || echo "already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
